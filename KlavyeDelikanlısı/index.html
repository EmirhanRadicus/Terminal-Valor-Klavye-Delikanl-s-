<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klavye Delikanlıları</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">


    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div id="baslangic-ekrani" class="tam-ekran-katmani d-flex flex-column justify-content-center align-items-center">
        <h1 class="baslangic-basligi mb-4">Klavye Delikanlıları</h1>
        <button id="btn-basla" class="btn btn-outline-light btn-lg px-5 py-2">Başla</button>
    </div>


    <div id="giris-ekrani" class="tam-ekran-katmani d-none flex-column justify-content-center align-items-center">
        <div class="sinematik-arkaplan"></div>
        <div class="hikaye-metni">Yine kötü bir sabah...</div>
    </div>

    <!-- Masaüstü Ortamı -->
    <div id="masaustu-ortami" class="tam-ekran-katmani d-none">

        <!-- İkonlar -->
        <div class="masaustu-ikonlari">
            <div class="ikon-ogesi tarayici-renk" data-app="tarayici">
                <i class="bi bi-compass"></i>
                <span>Tarayıcı</span>
            </div>
            <div class="ikon-ogesi notlar-renk" data-app="notlar">
                <i class="bi bi-stickies"></i>
                <span>Notlar</span>
            </div>
            <div class="ikon-ogesi sohbet-renk" data-app="sohbet">
                <i class="bi bi-chat-square-text"></i>
                <span>Sohbet</span>
            </div>
            <div class="ikon-ogesi terminal-renk" data-app="terminal">
                <i class="bi bi-code-square"></i>
                <span>Terminal</span>
            </div>
        </div>

        <!-- Terminal Penceresi -->
        <div id="pencere-terminal" class="isletim-sistemi-penceresi d-none" style="top: 100px; left: 150px;">
            <div class="pencere-basligi">
                <span><i class="bi bi-terminal"></i> Terminal</span>
                <i class="bi bi-x-square btn-pencere-kapat"></i>
            </div>
            <div class="pencere-govdesi terminal-govdesi">
                <div id="terminal-ciktisi"></div>
                <div class="terminal-girdi-satiri">
                    <span class="komut-istemi">root@kd:~#</span>
                    <input type="text" id="terminal-girdisi" autocomplete="off" spellcheck="false" autofocus>
                </div>
            </div>
        </div>

        <!-- Tarayıcı Penceresi -->
        <div id="pencere-tarayici" class="isletim-sistemi-penceresi d-none"
            style="top: 50px; left: 400px; width: 600px; height: 500px;">
            <div class="pencere-basligi">
                <span><i class="bi bi-compass"></i> Tarayıcı</span>
                <div>
                    <i class="bi bi-arrows-fullscreen me-3" id="btn-tarayici-tam-ekran"
                        style="cursor: pointer; color: #aaa; transition: color 0.2s;"
                        onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'"></i>
                    <i class="bi bi-x-square btn-pencere-kapat"></i>
                </div>
            </div>
            <div class="tarayici-araccubugu">
                <input type="text" id="tarayici-adresi" class="form-control form-control-sm"
                    placeholder="Aramak istediğiniz adresi girin...">
                <button id="tarayici-git" class="btn btn-sm btn-primary ms-2">Git</button>
            </div>
            <div class="pencere-govdesi" style="padding: 0; background: #fff;">
                <div id="tarayici-gorunumu">
                    <div class="text-center mt-5"
                        style="font-family: sans-serif; font-size: 4rem; font-weight: bold; padding-top: 100px;">
                        <span style="color: #4285F4">G</span><span style="color: #EA4335">o</span><span
                            style="color: #FBBC05">g</span><span style="color: #4285F4">o</span><span
                            style="color: #34A853">l</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notlar Penceresi -->
        <div id="pencere-notlar" class="isletim-sistemi-penceresi d-none"
            style="top: 80px; left: 550px; width: 400px; height: 450px;">
            <div class="pencere-basligi">
                <span><i class="bi bi-journal-text"></i> Notlar</span>
                <i class="bi bi-x-square btn-pencere-kapat"></i>
            </div>
            <div class="pencere-govdesi" style="padding: 0; display: flex; flex-direction: column;">
                <div
                    style="background-color: #ffd800; color: #000; font-weight: bold; padding: 5px 10px; border-bottom: 1px solid #ccab00;">
                    Sarı Defter</div>
                <textarea id="uygulama-notlar-alani" spellcheck="false"
                    placeholder="Notlarınızı buraya yazın... Otomatik olarak kaydedilir."></textarea>
            </div>
        </div>

        <!-- Alt Görev Çubuğu -->
        <div class="gorev-cubugu">
            <div class="gorev-cubugu-sol"></div>
            <div class="gorev-cubugu-sag" id="saat-gostergesi">
                --:-- | --.--.----
            </div>
        </div>

    </div>

    <!-- Kütüphaneler -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Typed.js -->
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>

    <!-- Ana Oyun Mantığı -->
    <script src="game.js"></script>
</body>

</html>
