<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karanlık Pazar — Darknet Freelance</title>
  <style>
    body { background: #050510; color: #a0a4a8; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
    header { border-bottom: 2px dashed #00ff88; padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    h1 { color: #00ff88; font-size: 24px; margin: 0; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
    .status { color: #33ff33; font-size: 14px; }
    .warning { border: 1px solid #ff3344; background: rgba(255,51,68,0.1); color: #ff3344; padding: 10px; font-size: 12px; margin-bottom: 20px; text-align: center; }
    
    .jobs-board { display: flex; flex-direction: column; gap: 15px; }
    .job-card { background: #0c0d12; border: 1px solid #1a1e24; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .job-card:hover { border-color: #00ff88; }
    
    .job-info h3 { color: #fff; margin: 0 0 5px 0; font-size: 16px; font-family: 'Inter', sans-serif;}
    .job-target { color: #ff3366; font-size: 13px; margin-bottom: 5px; }
    .job-desc { font-size: 12px; color: #6a707a; }
    
    .job-action { text-align: right; }
    .job-reward { color: #00ff88; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .accept-btn { background: #00ff88; color: #000; border: none; padding: 8px 16px; font-family: monospace; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    .accept-btn:hover { background: #00cc6a; }
    
    #loading { text-align: center; color: #00ff88; margin: 50px; font-size: 18px; }
  </style>
</head>
<body>
  <header>
    <h1>🧅 KARANLIK PAZAR : İŞ İLANLARI</h1>
    <div class="status">Bağlantı Şifreli [Ağ: TOR]</div>
  </header>
  
  <div class="warning">
    DİKKAT: Görevleri başarıyla tamamladıktan sonra ağ sağlayıcınızla iletişime geçin. (Broker) 
    İşlem güvenliği için tüm iletişimler şifrelidir.
  </div>

  <div id="loading">İş ilanları sunucudan çekiliyor...</div>
  <div class="jobs-board" id="jobs-board" style="display: none;"></div>

  <script>
    // Simulate fetching from backend
    setTimeout(function() {
      document.getElementById('loading').style.display = 'none';
      const board = document.getElementById('jobs-board');
      board.style.display = 'flex';
      
      try {
        const missions = window.parent.DarkForum.getAvailableMissions();
        let html = '';
        missions.forEach((m, idx) => {
          html += `
            <div class="job-card">
              <div class="job-info">
                <h3>${m.title}</h3>
                <div class="job-target">Hedef: ${m.site}</div>
                <div class="job-desc">İstenen Yöntem: ${m.type.toUpperCase()} | Beklenen Tecrübe: +${m.xP} XP</div>
              </div>
              <div class="job-action">
                <div class="job-reward">₿ ${m.reward}</div>
                <button class="accept-btn" onclick="acceptJob(${idx})">KABUL ET</button>
              </div>
            </div>
          `;
        });
        board.innerHTML = html;
        window.currentMissions = missions; // store locally
      } catch(e) {
        board.innerHTML = '<div style="color:red">Sistem hatası: Ebeveyn ağa bağlanılamadı.</div>';
      }
    }, 800);

    function acceptJob(index) {
      if(!window.currentMissions) return;
      const job = window.currentMissions[index];
      try {
        const success = window.parent.DarkForum.acceptMission(job);
        if(success) {
          // Visually remove job from board
          document.querySelectorAll('.job-card')[index].style.display = 'none';
        }
      } catch(e) {
        console.error(e);
        alert('Görev alınamadı.');
      }
    }
  </script>
</body>
</html>
